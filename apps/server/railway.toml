# Railway deploy config for the Fastify server.
#
# Watch paths are set to "**" so any change in the repo (packages/*,
# apps/server/*, root configs) triggers a rebuild. Earlier deploys silently
# skipped because Railway had narrowed watch paths to apps/server/** only.

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/server/Dockerfile"
watchPatterns = ["**"]

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/ready"
# Cold-start budget: container start (~3s) + first DB connection through the
# Supabase pooler (~5-10s for the cold pool) + Fastify routing.
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
numReplicas = 1
