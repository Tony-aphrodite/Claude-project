// ===================== NAVIGATION =====================
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const target = document.getElementById(pageId);
  if (target) target.classList.add('active');
  // Refresh icons
  if (window.lucide) lucide.createIcons();
}

function showScreen(screenName) {
  const screens = ['dashboard','customers','customerDetail','instructors','instructorProfile','payments','reports','settings','boats','map','studentCourse','studentPayments','studentDiploma','myStudents','myCommissions','myAvailability'];
  const main = document.getElementById('mainContent');
  
  // Close mobile sidebar
  document.getElementById('mobileSidebar').classList.add('-translate-x-full');
  document.getElementById('mobileSidebarOverlay').classList.add('hidden');

  switch(screenName) {
    case 'dashboard': renderDashboard(); break;
    case 'customers': renderCustomers(); break;
    case 'customerDetail': renderCustomerDetail(); break;
    case 'instructors': renderInstructors(); break;
    case 'instructorProfile': renderInstructorProfile(); break;
    case 'payments': renderPayments(); break;
    case 'reports': renderReports(); break;
    case 'settings': renderSettings(); break;
    case 'boats': renderBoats(); break;
    case 'map': renderMapPage(); break;
    case 'studentCourse': renderStudentCourse(); break;
    case 'studentPayments': renderStudentPayments(); break;
    case 'studentDiploma': renderStudentDiploma(); break;
    case 'myStudents': renderMyStudents(); break;
    case 'myCommissions': renderMyCommissions(); break;
    case 'instructorPayments': renderInstructorPayments(); break;
    case 'myAvailability': renderMyAvailability(); break;
  }
  if (window.lucide) setTimeout(() => lucide.createIcons(), 50);
}

function setPageTitle(title) {
  document.getElementById('pageTitle').textContent = title;
}

// ===================== LOGIN / LOGOUT =====================
function login(role) {
  currentRole = role;
  const names = { owner: { name: 'DPM Owner', roleLabel: 'Owner' }, manager: { name: 'Manager Koh Tao', roleLabel: 'Manager' }, instructor: { name: 'John Smith', roleLabel: 'Instructor' } };
  currentUser = names[role] || { name: 'Usuario', roleLabel: role };
  
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appLayout').style.display = 'flex';
  
  // Setup sidebar
  setupSidebar();
  setupBadge();
  
  // Show dashboard
  showScreen('dashboard');
}

function showStudentLogin() {
  document.getElementById('studentLoginForm').classList.remove('hidden');
  setTimeout(() => document.getElementById('studentCode').focus(), 100);
}

function hideStudentLogin() {
  document.getElementById('studentLoginForm').classList.add('hidden');
  document.getElementById('studentError').classList.add('hidden');
}

function studentLogin() {
  const code = document.getElementById('studentCode').value.trim();
  const customer = CUSTOMERS.find(c => c.accessCode === code);
  if (!customer) {
    document.getElementById('studentError').classList.remove('hidden');
    return;
  }
  document.getElementById('studentError').classList.add('hidden');
  currentRole = 'student';
  currentUser = { name: `${customer.firstName} ${customer.lastName}`, roleLabel: 'Alumno' };
  currentCustomer = customer;
  currentShop = SHOPS.find(s => s.id === customer.shopId) || SHOPS[0];
  
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appLayout').style.display = 'flex';
  
  setupSidebar();
  setupBadge();
  showScreen('studentCourse');
}

function logout() {
  currentRole = null;
  currentUser = null;
  currentCustomer = null;
  document.getElementById('appLayout').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('studentLoginForm').classList.add('hidden');
  document.getElementById('studentCode').value = '';
  if (mapInstance) { mapInstance.remove(); mapInstance = null; }
}

function toggleMobileSidebar() {
  const sidebar = document.getElementById('mobileSidebar');
  const overlay = document.getElementById('mobileSidebarOverlay');
  if (sidebar.classList.contains('-translate-x-full')) {
    sidebar.classList.remove('-translate-x-full');
    overlay.classList.remove('hidden');
  } else {
    sidebar.classList.add('-translate-x-full');
    overlay.classList.add('hidden');
  }
}

function filterCustomers(q) {
  const rows = document.querySelectorAll('#customersList tbody tr');
  rows.forEach(row => {
    row.style.display = row.textContent.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
  });
}

function addCustomer() {
  const fn = document.getElementById('newFirstName').value;
  const ln = document.getElementById('newLastName').value;
  if (!fn || !ln) { alert('Nombre y apellido son obligatorios'); return; }
  const newId = Math.max(...CUSTOMERS.map(c => c.id)) + 1;
  const code = 'DPM' + Math.floor(100 + Math.random() * 899) + String.fromCharCode(65 + Math.floor(Math.random() * 26));
  CUSTOMERS.unshift({
    id: newId, firstName: fn, lastName: ln, email: document.getElementById('newEmail').value, phone: document.getElementById('newPhone').value,
    shopId: parseInt(document.getElementById('newShop').value), status: 'active', accessCode: code,
    country: '', language: '', courseId: parseInt(document.getElementById('newCourse').value),
    stageProgress: [0,0,0,0,0,0,0], payments: [], balance: COURSE_TYPES.find(ct => ct.id === parseInt(document.getElementById('newCourse').value))?.price || 11500
  });
  alert(`Alumno registrado! Codigo: ${code}`);
  hideAddCustomerForm();
  renderCustomers();
}

function generateCodeForCustomer() {
  if (!currentCustomer) return;
  currentCustomer.accessCode = 'DPM' + Math.floor(100 + Math.random() * 899) + String.fromCharCode(65 + Math.floor(Math.random() * 26));
  alert(`Codigo generado: ${currentCustomer.accessCode}`);
  renderCustomerDetail();
}

function markStageComplete(idx) {
  if (!currentCustomer) return;
  if (STAGES[idx].id === 'finalpay' && currentCustomer.balance > 0) { alert('No se puede marcar Pago Final con saldo pendiente'); return; }
  currentCustomer.stageProgress[idx] = 1;
  alert(`${STAGES[idx].name} marcado como completado!`);
  renderCustomerDetail();
}

        ${pendingPayments.length ? pendingPayments.map(pp => `
          <div class="flex items-center justify-between p-3 rounded-lg bg-amber-50/50 border border-amber-100 mb-2">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-full bg-amber-100 flex items-center justify-center text-amber-700 text-xs font-bold">${pp.customer.firstName[0]}</div>
              <div><p class="text-sm font-medium text-slate-800">${pp.customer.firstName} ${pp.customer.lastName}</p><p class="text-xs text-slate-400">Transferencia/WISE</p></div>
            </div>
            <div class="flex items-center gap-2">
              <span class="font-bold text-amber-600">฿${pp.amount.toLocaleString()}</span>
              <button onclick="confirmPayment(${pp.customer.id})" class="px-3 py-1.5 bg-emerald-600 text-white text-xs rounded-lg hover:bg-emerald-700">Confirmar</button>
            </div>
          </div>
        `).join('') : '<p class="text-sm text-slate-400 text-center py-4">No hay pagos pendientes</p>'}
      </div>
    </div>
  `;
}

function confirmPayment(customerId) {
  const c = CUSTOMERS.find(x => x.id === customerId);
  if (c) {
    c.payments.forEach(p => { if (p.status === 'pending') p.status = 'confirmed'; });
    c.balance = Math.max(0, c.balance - c.payments.filter(p => p.status === 'confirmed').reduce((s, p) => s + p.amount, 0));
    c.status = c.balance <= 0 ? 'active' : 'pending_payment';
    alert(`Pago confirmado para ${c.firstName} ${c.lastName}!`);
    renderPayments();
  }
}
